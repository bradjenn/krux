<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14"/>
      <stop offset="100%" style="stop-color:#060a0e"/>
    </linearGradient>
    <linearGradient id="cyan1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c00"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- Glowing connection lines -->
  <g filter="url(#glow)" opacity="0.4">
    <line x1="256" y1="256" x2="140" y2="140" stroke="#ff8c00" stroke-width="3"/>
    <line x1="256" y1="256" x2="380" y2="130" stroke="#ff8c00" stroke-width="3"/>
    <line x1="256" y1="256" x2="120" y2="300" stroke="#ff8c00" stroke-width="3"/>
    <line x1="256" y1="256" x2="370" y2="350" stroke="#ff8c00" stroke-width="3"/>
    <line x1="256" y1="256" x2="200" y2="400" stroke="#ff8c00" stroke-width="3"/>
    <line x1="256" y1="256" x2="400" y2="240" stroke="#ff8c00" stroke-width="3"/>
  </g>

  <!-- Outer nodes with glow -->
  <g filter="url(#glow)">
    <circle cx="140" cy="140" r="14" fill="#ff8c00" opacity="0.8"/>
    <circle cx="380" cy="130" r="14" fill="#ff8c00" opacity="0.8"/>
    <circle cx="120" cy="300" r="11" fill="#ff8c00" opacity="0.6"/>
    <circle cx="370" cy="350" r="12" fill="#ff8c00" opacity="0.7"/>
    <circle cx="200" cy="400" r="10" fill="#ff8c00" opacity="0.6"/>
    <circle cx="400" cy="240" r="12" fill="#ff8c00" opacity="0.7"/>
  </g>

  <!-- Center hub glow -->
  <circle cx="256" cy="256" r="70" fill="#ff8c00" opacity="0.05" filter="url(#softglow)"/>
  <circle cx="256" cy="256" r="50" fill="#0e1620" stroke="#ff8c00" stroke-width="7"/>

  <!-- Chevron -->
  <path d="M 240 245 L 258 258 L 240 271" fill="none" stroke="#ff8c00" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
